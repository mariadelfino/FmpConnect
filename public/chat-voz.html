<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMPConnect — Chat por Voz</title>
    <link rel="icon" type="image/png" href="./assets/images/favicon.png">

    <script>
        (function () {
            try {
                const saved = localStorage.getItem('Fmpconnect-acessibilidade');
                if (saved) {
                    const estado = JSON.parse(saved);

                    if (estado.tema === 'claro') {
                        document.documentElement.setAttribute('data-theme', 'light');
                    }

                    if (estado.scaleFactor && estado.scaleFactor !== 1) {
                        document.documentElement.style.setProperty('--scale-factor', estado.scaleFactor);
                    }

                    document.addEventListener('DOMContentLoaded', function () {
                        const mains = document.querySelectorAll('main');

                        if (estado.filtroDaltonismo && estado.filtroDaltonismo !== 'none') {
                            mains.forEach(function (main) {
                                main.classList.add('filtro-' + estado.filtroDaltonismo);
                            });
                            document.body.setAttribute('data-filtro-daltonismo', estado.filtroDaltonismo);
                        }

                        if (estado.contraste) {
                            mains.forEach(function (main) {
                                main.classList.add('alto-contraste');
                            });
                            document.body.setAttribute('data-alto-contraste', 'true');
                        }
                    });
                }
            } catch (e) {}
        })();
    </script>

    <link rel="stylesheet" href="./assets/css/componentes.css">
    <link rel="stylesheet" href="./assets/css/cabecalho.css">
    <link rel="stylesheet" href="./assets/css/reset.css">
    <link rel="stylesheet" href="./assets/css/variables.css">
    <link rel="stylesheet" href="./assets/css/painel-acessibilidade.css">
    <link rel="stylesheet" href="./assets/css/filtros-acessibilidade.css">

    <style>
        /* ==========================================================
           Chat por Voz — estilos específicos da página
           Os estilos base (cabecalho, botoes, variáveis) vêm dos
           arquivos CSS linkados no <head>.
           ========================================================== */

        body {
            background: var(--gradient-primary);
            color: var(--color-primary-text);
            font-family: var(--font-family-primary);
            min-height: 100vh;
        }

        .pagina-voz {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ----------------------------------------------------------
           Botão de reiniciar — variante menor, dentro do conteúdo
           ---------------------------------------------------------- */
        .botao-reset {
            width: var(--size-icon-sm);
            height: var(--size-icon-sm);
            border-radius: 50%;
            border: 1.5px solid var(--color-primary-border);
            background: transparent;
            color: var(--color-primary-icon);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition:
                background var(--transition-base),
                border-color var(--transition-base),
                transform var(--transition-base);
        }
        .botao-reset svg {
            width: 55%;
            height: 55%;
        }
        .botao-reset:hover {
            background: var(--color-primary-background-hover);
            border-color: var(--color-primary);
            transform: scale(1.05);
        }
        .botao-reset:active { transform: scale(0.95); }

        /* ----------------------------------------------------------
           Área central — conteúdo da interface de voz
           ---------------------------------------------------------- */
        .area-central {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-xl);
            padding: var(--spacing-xl) var(--spacing-lg);
            width: 100%;
            max-width: 500px;
        }

        /* ----------------------------------------------------------
           Anéis de pulso ao redor do microfone
           ---------------------------------------------------------- */
        .area-microfone {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .anel {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--color-primary);
            opacity: 0;
            pointer-events: none;
        }
        .anel-1 { width: calc(140px * var(--scale-factor, 1)); height: calc(140px * var(--scale-factor, 1)); }
        .anel-2 { width: calc(180px * var(--scale-factor, 1)); height: calc(180px * var(--scale-factor, 1)); }
        .anel-3 { width: calc(220px * var(--scale-factor, 1)); height: calc(220px * var(--scale-factor, 1)); }

        body.ouvindo .anel-1 { animation: pulso 1.5s ease-out infinite 0s; }
        body.ouvindo .anel-2 { animation: pulso 1.5s ease-out infinite .3s; }
        body.ouvindo .anel-3 { animation: pulso 1.5s ease-out infinite .6s; }

        @keyframes pulso {
            0%   { transform: scale(0.8); opacity: 0.7; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        body.falando .anel-1 { animation: onda 1s ease-in-out infinite alternate 0s; opacity: 0.4; }
        body.falando .anel-2 { animation: onda 1s ease-in-out infinite alternate .2s; opacity: 0.25; }
        body.falando .anel-3 { animation: onda 1s ease-in-out infinite alternate .4s; opacity: 0.15; }

        @keyframes onda {
            from { transform: scale(0.95); }
            to   { transform: scale(1.1); }
        }

        /* ----------------------------------------------------------
           Botão do microfone
           ---------------------------------------------------------- */
        .btn-microfone {
            width: calc(110px * var(--scale-factor, 1));
            height: calc(110px * var(--scale-factor, 1));
            border-radius: 50%;
            border: none;
            background: var(--gradient-button-pink);
            color: white;
            cursor: pointer;
            display: grid;
            place-items: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 40px rgba(0, 159, 227, 0.3);
            transition: transform var(--transition-base), box-shadow var(--transition-base);
        }

        .btn-microfone:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(0, 159, 227, 0.5);
        }
        .btn-microfone:active:not(:disabled) { transform: scale(0.97); }
        .btn-microfone:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Estados funcionais do botão (cores de feedback visual) */
        body.ouvindo .btn-microfone {
            background: linear-gradient(135deg, #EF4444, #991b1b);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.4);
            animation: pulso-btn .8s ease-in-out infinite alternate;
        }
        body.falando .btn-microfone {
            background: linear-gradient(135deg, #10B981, #065f46);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.4);
        }
        body.processando .btn-microfone {
            background: linear-gradient(135deg, #F59E0B, #78350f);
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.3);
        }

        @keyframes pulso-btn {
            from { transform: scale(1); }
            to   { transform: scale(1.04); }
        }

        /* Ícones dentro do botão — trocados por CSS conforme estado */
        .icone-mic, .icone-stop, .icone-spinner, .icone-som {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity var(--transition-fast);
        }
        .icone-mic     { opacity: 1; }
        .icone-stop    { opacity: 0; }
        .icone-spinner { opacity: 0; animation: spin .8s linear infinite; }
        .icone-som     { opacity: 0; }

        @keyframes spin { to { transform: rotate(360deg); } }

        body.ouvindo     .icone-mic      { opacity: 0; }
        body.ouvindo     .icone-stop     { opacity: 1; }
        body.processando .icone-mic      { opacity: 0; }
        body.processando .icone-spinner  { opacity: 1; }
        body.falando     .icone-mic      { opacity: 0; }
        body.falando     .icone-som      { opacity: 1; }

        /* ----------------------------------------------------------
           Texto de estado
           ---------------------------------------------------------- */
        .estado-texto { text-align: center; }

        .estado-principal {
            font-size: var(--font-size-lg);
            font-weight: var(--font-weight-bold);
            color: var(--color-primary-text);
            margin-bottom: var(--spacing-xs);
            min-height: 1.5em;
        }

        .estado-secundario {
            font-size: var(--font-size-sm);
            color: var(--color-primary-text);
            opacity: 0.55;
            min-height: 1.2em;
        }

        /* ----------------------------------------------------------
           Transcrição da fala do usuário
           ---------------------------------------------------------- */
        .transcricao {
            font-size: var(--font-size-sm);
            color: var(--color-primary-text);
            opacity: 0.6;
            font-style: italic;
            text-align: center;
            min-height: 1.2em;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ----------------------------------------------------------
           Toggle modo contínuo
           ---------------------------------------------------------- */
        .toggle-continuo {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: var(--font-size-sm);
            color: var(--color-primary-text);
            opacity: 0.6;
            cursor: pointer;
            user-select: none;
        }
        .toggle-continuo input { display: none; }

        .toggle-track {
            width: 36px;
            height: 20px;
            background: var(--color-primary-border);
            border-radius: var(--radius-full);
            position: relative;
            transition: background var(--transition-base);
            flex-shrink: 0;
        }
        .toggle-track::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--color-primary-text);
            top: 3px;
            left: 3px;
            transition: transform var(--transition-base);
        }
        .toggle-continuo input:checked + .toggle-track { background: var(--color-primary); }
        .toggle-continuo input:checked + .toggle-track::after { transform: translateX(16px); }

        /* ----------------------------------------------------------
           Aviso de navegador sem suporte
           ---------------------------------------------------------- */
        .sem-suporte {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-lg);
            color: #fca5a5;
            font-size: var(--font-size-sm);
            padding: var(--spacing-md) var(--spacing-lg);
            text-align: center;
            display: none;
        }

        /* ==========================================================
           Modo claro — ajustes de contraste para fundo branco
           ========================================================== */
        [data-theme="light"] .anel {
            border-color: var(--color-primary);
            opacity: 0;
        }
        [data-theme="light"] .toggle-track {
            background: var(--color-primary-border);
        }
        [data-theme="light"] .toggle-track::after {
            background: var(--color-primary-dark);
        }

        /* ==========================================================
           Responsividade
           ========================================================== */
        @media (min-width: 768px) {
            .area-central {
                max-width: 600px;
                gap: var(--spacing-2xl);
                padding: var(--spacing-2xl) var(--spacing-xl);
            }
            .btn-microfone {
                width: calc(130px * var(--scale-factor, 1));
                height: calc(130px * var(--scale-factor, 1));
            }
            .anel-1 { width: calc(170px * var(--scale-factor, 1)); height: calc(170px * var(--scale-factor, 1)); }
            .anel-2 { width: calc(210px * var(--scale-factor, 1)); height: calc(210px * var(--scale-factor, 1)); }
            .anel-3 { width: calc(250px * var(--scale-factor, 1)); height: calc(250px * var(--scale-factor, 1)); }
        }

        @media (min-width: 1024px) {
            .area-central {
                max-width: 700px;
            }
            .btn-microfone {
                width: calc(140px * var(--scale-factor, 1));
                height: calc(140px * var(--scale-factor, 1));
            }
        }
    </style>
</head>

                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M3 3v5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>

            <!-- Aviso sem suporte -->
            <div class="sem-suporte" id="sem-suporte" role="alert">
                Seu navegador não suporta reconhecimento de voz.<br>
                Use <strong>Chrome</strong> ou <strong>Edge</strong> para usar esta funcionalidade.
            </div>

        </section>

    </main>

    <script src="./assets/js/acessibilidade-global.js"></script>

    <script>
        const API = window.location.origin;

        const btnMic       = document.getElementById('btn-mic');
        const btnReset     = document.getElementById('btn-reset');
        const estadoPrinc  = document.getElementById('estado-principal');
        const estadoSecund = document.getElementById('estado-secundario');
        const transcricao  = document.getElementById('transcricao');
        const toggleCont   = document.getElementById('toggle-continuo');
        const semSuporteEl = document.getElementById('sem-suporte');

        const HISTORICO_KEY = 'fmpconnect_voz_historico_v1';
        let historico = JSON.parse(sessionStorage.getItem(HISTORICO_KEY) || '[]');
        let estado = 'ocioso';
        let audioDesbloqueado = false;
        let audioAtual = null;

        // Elemento de áudio único e reutilizável — desbloqueado no primeiro clique
        const audioEl = document.createElement('audio');
        document.body.appendChild(audioEl);

        function desbloquearAudio() {
            if (audioDesbloqueado) return;
            audioEl.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
            audioEl.play().catch(() => {});
            audioDesbloqueado = true;
        }

        // ── Verificar suporte ───────────────────
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            semSuporteEl.style.display = 'block';
            btnMic.disabled = true;
            setEstado('ocioso', 'Navegador sem suporte', 'Use Chrome ou Edge');
        }

        // ── Reconhecimento de voz ───────────────
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                setEstado('ouvindo', 'Ouvindo...', 'Fale sua pergunta');
            };

            recognition.onresult = (event) => {
                let interim = '';
                let final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }
                transcricao.textContent = final || interim;
                if (final) enviarMensagem(final.trim());
            };

            recognition.onerror = (e) => {
                if (e.error === 'no-speech') {
                    setEstado('ocioso', 'Toque para falar', 'Nenhuma fala detectada');
                } else if (e.error !== 'aborted') {
                    setEstado('ocioso', 'Toque para falar', 'Erro: ' + e.error);
                }
            };

            recognition.onend = () => {
                if (estado === 'ouvindo') {
                    setEstado('ocioso', 'Toque para falar', 'Modo conversa por voz');
                }
            };
        }

        // ── Botão microfone ─────────────────────
        btnMic.addEventListener('click', () => {
            desbloquearAudio();
            if (estado === 'ouvindo') {
                recognition.stop();
                setEstado('ocioso', 'Toque para falar', 'Modo conversa por voz');
            } else if (estado === 'falando') {
                pararAudio();
                if (toggleCont.checked) iniciarEscuta();
                else setEstado('ocioso', 'Toque para falar', 'Modo conversa por voz');
            } else if (estado === 'ocioso') {
                iniciarEscuta();
            }
        });

        btnReset.addEventListener('click', () => {
            pararAudio();
            if (recognition && estado === 'ouvindo') recognition.stop();
            historico = [];
            sessionStorage.removeItem(HISTORICO_KEY);
            transcricao.textContent = '';
            setEstado('ocioso', 'Toque para falar', 'Conversa reiniciada');
        });

        function iniciarEscuta() {
            if (!recognition) return;
            transcricao.textContent = '';
            try {
                recognition.start();
            } catch (e) {
                // já estava rodando
                recognition.stop();
                setTimeout(() => recognition.start(), 300);
            }
        }

        // ── Enviar mensagem ─────────────────────
        async function enviarMensagem(texto) {
            if (!texto) return;
            setEstado('processando', 'Processando...', 'Aguarde um momento');
            transcricao.textContent = '"' + texto + '"';

            historico.push({ role: 'user', content: texto });

            try {
                const resp = await fetch(API + '/text/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: texto, history: historico.slice(-10), mode: 'normal' })
                });

                if (!resp.ok) throw new Error('Erro ' + resp.status);
                const data = await resp.json();

                if (data.answer) {
                    historico.push({ role: 'model', content: data.answer });
                    sessionStorage.setItem(HISTORICO_KEY, JSON.stringify(historico));
                    await falar(data.answer);
                } else {
                    throw new Error('Resposta vazia');
                }
            } catch (err) {
                console.error(err);
                setEstado('ocioso', 'Toque para falar', 'Erro de conexão. Tente novamente.');
            }
        }

        // ── Text-to-Speech ──────────────────────
        async function falar(texto) {
            setEstado('falando', 'FMPConnect está falando...', 'Toque para interromper');

            const textoLimpo = texto
                .replace(/\*\*/g, '').replace(/\*/g, '')
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                .replace(/^#+\s+/gm, '')
                .replace(/- /g, ', ')
                .replace(/\n\n/g, '. ').replace(/\n/g, ' ').trim();

            try {
                const resp = await fetch(API + '/text/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textoLimpo })
                });

                if (!resp.ok) throw new Error('Erro TTS');

                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                audioAtual = audioEl;
                audioAtual.src = url;

                await new Promise((resolve) => {
                    audioAtual.onended = resolve;
                    audioAtual.onerror = resolve;
                    audioAtual.play().catch(resolve);
                });

            } catch (err) {
                console.error('TTS erro:', err);
            } finally {
                audioAtual = null;
                if (toggleCont.checked) {
                    setTimeout(() => iniciarEscuta(), 600);
                } else {
                    setEstado('ocioso', 'Toque para falar', 'Modo conversa por voz');
                }
            }
        }

        function pararAudio() {
            if (audioAtual) {
                audioAtual.pause();
                audioAtual = null;
            }
        }

        // ── Estado visual ───────────────────────
        function setEstado(novoEstado, principal, secundario) {
            estado = novoEstado;
            document.body.className = novoEstado;
            estadoPrinc.textContent = principal;
            estadoSecund.textContent = secundario;

            const labels = {
                ocioso:       'Toque para falar',
                ouvindo:      'Toque para parar de ouvir',
                processando:  'Processando sua pergunta',
                falando:      'Toque para interromper'
            };
            btnMic.setAttribute('aria-label', labels[novoEstado] || 'Microfone');
            btnMic.disabled = (novoEstado === 'processando');
        }
    </script>

</body>
</html>
